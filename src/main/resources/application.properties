# Name displayed for the application
spring.application.name=menu-manager

# Store the H2 database in the project's data folder
spring.datasource.url=jdbc:h2:file:./data/menu-manager
spring.datasource.username=sa
spring.datasource.password=

# Automatically update database tables from entity classes
spring.jpa.hibernate.ddl-auto=update

# Enable the H2 development console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console